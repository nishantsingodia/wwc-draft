name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm test                 # effective-lineup + points (gate + legacy backward-compat)
      - run: npm run test:integration  # freeze write/read-back against the real schema
      - run: npm run build             # the production type-check
